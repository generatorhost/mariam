name: Mariam Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Run executable verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm install

      - name: Run Mariam verification
        run: npm run verify
